{% load i18n %}
{#
  Global command palette (Ctrl/⌘+K).
  Triggered by the 'cmdk:open' CustomEvent dispatched from static/js/app.js.
  Filters a hard-coded set of navigation items by substring match.
#}
<div
  x-data="{
    open: false,
    q: '',
    idx: 0,
    items: [
      { href: '{% if user.is_authenticated %}{% url 'dashboard:app' %}{% else %}{% url 'dashboard:home' %}{% endif %}', label: '{% trans 'Bosh sahifa' %}',  icon: 'home',    section: '{% trans 'Navigatsiya' %}' },
      {% if user.is_authenticated %}
      { href: '{% url 'dashboard:app' %}',         label: '{% trans 'Dashboard' %}',     icon: 'grid',  section: '{% trans 'Navigatsiya' %}' },
      { href: '{% url 'social:accounts' %}',       label: '{% trans 'Akkauntlarim' %}',  icon: 'link',  section: '{% trans 'Navigatsiya' %}' },
      { href: '{% url 'analytics:overview' %}',    label: '{% trans 'Analytics' %}',     icon: 'chart', section: '{% trans 'Navigatsiya' %}' },
      { href: '{% url 'analytics:sentiment' %}',   label: '{% trans 'Sentiment' %}',     icon: 'smile', section: '{% trans 'Navigatsiya' %}' },
      { href: '{% url 'reports:index' %}',         label: '{% trans 'Hisobotlar' %}',    icon: 'file',  section: '{% trans 'Navigatsiya' %}' },
      { href: '{% url 'reports:export_xlsx' %}',   label: '{% trans 'Excel eksport (.xlsx)' %}', icon: 'file', section: '{% trans 'Eksport' %}' },
      { href: '{% url 'reports:export_pdf' %}',    label: '{% trans 'PDF eksport' %}',   icon: 'file',  section: '{% trans 'Eksport' %}' },
      { href: '{% url 'accounts:settings' %}',     label: '{% trans 'Sozlamalar' %}',    icon: 'gear',  section: '{% trans 'Sozlamalar' %}' },
      { href: '{% url 'account_logout' %}',      label: '{% trans 'Chiqish' %}',     icon: 'logout',  section: '{% trans 'Akkaunt' %}' },
      {% else %}
      { href: '{% url 'account_login' %}',       label: '{% trans 'Kirish' %}',     icon: 'login',   section: '{% trans 'Akkaunt' %}' },
      { href: '{% url 'account_signup' %}',      label: '{% trans 'Ro\u2019yxatdan o\u2019tish' %}', icon: 'user-plus', section: '{% trans 'Akkaunt' %}' },
      {% endif %}
      { href: '/api/v1/docs/',                   label: 'API docs',                  icon: 'code',    section: '{% trans 'Resurslar' %}' },
      { href: 'https://github.com/Sardor2004777/social-media-analytics', label: 'GitHub', icon: 'github', section: '{% trans 'Resurslar' %}' }
    ],
    toggleTheme() {
      const d = document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', d ? 'dark' : 'light');
    },
    get filtered() {
      if (!this.q.trim()) return this.items;
      const n = this.q.toLowerCase();
      return this.items.filter(i => i.label.toLowerCase().includes(n));
    },
    reset() { this.q = ''; this.idx = 0; },
    move(delta) {
      const max = this.filtered.length - 1;
      if (max < 0) return;
      this.idx = (this.idx + delta + max + 1) % (max + 1);
    },
    select() {
      const item = this.filtered[this.idx];
      if (item) { this.open = false; window.location.href = item.href; }
    }
  }"
  @cmdk:open.window="open = true; reset(); $nextTick(() => $refs.search && $refs.search.focus())"
  @keydown.escape.window="open = false"
  x-show="open" x-cloak
  x-transition:enter="transition ease-out duration-200"
  x-transition:enter-start="opacity-0"
  x-transition:enter-end="opacity-100"
  x-transition:leave="transition ease-in duration-150"
  x-transition:leave-start="opacity-100"
  x-transition:leave-end="opacity-0"
  class="fixed inset-0 z-[60] flex items-start justify-center p-4 pt-[15vh]"
  role="dialog"
  aria-modal="true"
  aria-label="{% trans 'Komandalar paneli' %}"
>
  <div class="absolute inset-0 bg-slate-900/50 backdrop-blur-sm" @click="open = false" aria-hidden="true"></div>

  <div
    @click.stop
    x-show="open" x-cloak
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 scale-95 translate-y-2"
    x-transition:enter-end="opacity-100 scale-100 translate-y-0"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100 scale-100"
    x-transition:leave-end="opacity-0 scale-95"
    class="relative w-full max-w-xl rounded-card bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 shadow-float overflow-hidden"
  >
    <div class="flex items-center gap-3 px-4 h-14 border-b border-slate-200 dark:border-slate-800">
      <svg class="h-5 w-5 text-slate-400 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input
        x-ref="search"
        x-model="q"
        @keydown.arrow-down.prevent="move(1)"
        @keydown.arrow-up.prevent="move(-1)"
        @keydown.enter.prevent="select()"
        type="text"
        placeholder="{% trans 'Nimani qidiryapsiz?' %}"
        class="flex-1 bg-transparent text-slate-900 dark:text-white text-base placeholder-slate-400 focus:outline-none border-0"
        autocomplete="off"
      >
      <span class="kbd">Esc</span>
    </div>

    <div class="max-h-[50vh] overflow-y-auto p-2">
      <template x-if="filtered.length === 0">
        <div class="px-4 py-10 text-center text-sm text-slate-500 dark:text-slate-400">
          {% trans "Hech narsa topilmadi" %}
        </div>
      </template>
      <template x-for="(item, i) in filtered" :key="i">
        <a :href="item.href"
           @mouseenter="idx = i"
           :class="idx === i ? 'bg-brand-50 dark:bg-brand-900/30 text-brand-700 dark:text-brand-300' : 'text-slate-700 dark:text-slate-200'"
           class="flex items-center gap-3 px-3 py-2.5 rounded-md text-sm cursor-pointer transition">
          <span class="inline-flex h-7 w-7 items-center justify-center rounded-md bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 shrink-0">
            <template x-if="item.icon === 'home'"><svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></template>
            <template x-if="item.icon === 'grid'"><svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></template>
            <template x-if="item.icon === 'link'"><svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 007 0l3-3a5 5 0 00-7-7l-1 1"/><path d="M14 11a5 5 0 00-7 0l-3 3a5 5 0 007 7l1-1"/></svg></template>
            <template x-if="item.icon === 'chart'"><svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></template>
            <template x-if="item.icon === 'smile'"><svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg></template>
            <template x-if="item.icon === 'file'"><svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></template>
            <template x-if="item.icon === 'gear'"><svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09A1.65 1.65 0 004.6 9"/></svg></template>
            <template x-if="item.icon === 'logout'"><svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></template>
            <template x-if="item.icon === 'login'"><svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg></template>
            <template x-if="item.icon === 'user-plus'"><svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg></template>
            <template x-if="item.icon === 'code'"><svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></template>
            <template x-if="item.icon === 'github'"><svg class="h-4 w-4" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.37.5 0 5.88 0 12.52c0 5.3 3.44 9.8 8.2 11.38.6.11.83-.26.83-.58 0-.29-.01-1.04-.02-2.05-3.34.73-4.04-1.61-4.04-1.61-.55-1.4-1.35-1.77-1.35-1.77-1.1-.76.08-.74.08-.74 1.22.08 1.86 1.26 1.86 1.26 1.08 1.86 2.84 1.32 3.54 1.01.11-.79.42-1.32.77-1.63-2.66-.31-5.47-1.34-5.47-5.96 0-1.32.47-2.39 1.24-3.24-.13-.3-.54-1.53.12-3.18 0 0 1.01-.32 3.3 1.24a11.4 11.4 0 016.01 0c2.29-1.56 3.3-1.24 3.3-1.24.66 1.65.25 2.88.13 3.18.77.85 1.24 1.92 1.24 3.24 0 4.64-2.81 5.64-5.49 5.95.43.37.81 1.1.81 2.22 0 1.6-.01 2.89-.01 3.28 0 .32.22.7.83.58 4.77-1.59 8.2-6.09 8.2-11.38C24 5.88 18.63.5 12 .5z"/></svg></template>
          </span>
          <span class="flex-1 truncate" x-text="item.label"></span>
          <span class="text-xs text-slate-400 dark:text-slate-500" x-text="item.section"></span>
        </a>
      </template>
    </div>

    <div class="flex items-center justify-between gap-3 px-4 h-10 border-t border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950/50 text-xs text-slate-500 dark:text-slate-400">
      <div class="flex items-center gap-3">
        <span class="inline-flex items-center gap-1"><span class="kbd">↑</span><span class="kbd">↓</span> {% trans "tanlash" %}</span>
        <span class="inline-flex items-center gap-1"><span class="kbd">↵</span> {% trans "ochish" %}</span>
      </div>
      <button type="button" @click="toggleTheme()" class="inline-flex items-center gap-1 hover:text-brand-600 dark:hover:text-brand-400 transition">
        <svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        {% trans "Mavzu" %}
      </button>
    </div>
  </div>
</div>
