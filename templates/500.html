{% load i18n static %}<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE|default:'uz' }}" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>500 — {% trans "Server xatosi" %}</title>
  <link rel="preconnect" href="https://rsms.me/">
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  <link rel="stylesheet" href="{% static 'css/output.css' %}">
</head>
<body class="h-full bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 font-sans antialiased">
  <div class="relative min-h-screen flex flex-col items-center justify-center text-center px-4 py-16 overflow-hidden">
    <div aria-hidden="true" class="absolute inset-0 -z-10 pointer-events-none">
      <div class="absolute top-[-10%] left-[10%] h-[30rem] w-[30rem] rounded-full bg-rose-500/25 blur-3xl"></div>
      <div class="absolute bottom-[-20%] right-[10%] h-[30rem] w-[30rem] rounded-full bg-orange-500/20 blur-3xl"></div>
    </div>
    <div class="animate-fade-up">
      <div class="text-7xl sm:text-8xl md:text-[10rem] lg:text-[14rem] font-black leading-none bg-clip-text text-transparent bg-gradient-to-br from-rose-500 via-orange-500 to-amber-500 select-none tracking-tightest">
        500
      </div>
      <h1 class="mt-4 text-2xl sm:text-3xl md:text-4xl font-bold text-slate-900 dark:text-white tracking-tight">
        {% trans "Biz allaqachon ishlayapmiz" %}
      </h1>
      <p class="mt-4 max-w-md mx-auto text-slate-600 dark:text-slate-400 leading-relaxed">
        {% trans "Serverda kutilmagan xato yuz berdi. Bir oz kuting va qayta urinib ko'ring." %}
      </p>
      <div class="mt-10 flex flex-col sm:flex-row items-center justify-center gap-3">
        <a href="/" class="inline-flex items-center gap-2 rounded-button px-5 py-3 text-sm font-medium text-white bg-gradient-to-r from-rose-500 to-orange-500 hover:opacity-95 transition shadow-soft">
          <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          {% trans "Bosh sahifa" %}
        </a>
        <button type="button" onclick="location.reload()" class="inline-flex items-center gap-2 rounded-button px-5 py-3 text-sm font-medium text-slate-700 dark:text-slate-200 bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800 transition">
          <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
          {% trans "Qayta urinish" %}
        </button>
      </div>
    </div>
  </div>
</body>
</html>
