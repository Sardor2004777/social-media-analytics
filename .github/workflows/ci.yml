name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 6379:6379

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      SECRET_KEY: ci-test-secret-key
      DATABASE_URL: postgres://test:test@localhost:5432/test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      # Deterministic Fernet key for CI only — never used to encrypt real data.
      # Real production key is set in Railway env (rotated independently).
      ENCRYPTION_KEY: "Wj7p2X9sK3mN5qR8tV1yA4bC6eF0gH2iJ5lM8nP1qS4="

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/*.txt

      - name: Install system deps (gettext for makemessages)
        run: sudo apt-get update && sudo apt-get install -y gettext

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Django system check
        run: python manage.py check --deploy --fail-level WARNING || true

      - name: Migration drift check
        run: python manage.py makemigrations --check --dry-run

      - name: Run tests with coverage
        run: pytest -ra --cov=apps --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
